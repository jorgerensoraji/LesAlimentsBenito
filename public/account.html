<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Account | Les Aliments Benito</title>
  <link rel="stylesheet" href="/css/styles.css?v=20260520-3" />
</head>
<body data-page="account">
  <header class="site-header">
    <a class="brand" href="/">
      <img src="/image/beni.png" alt="Les Aliments Benito logo" />
      <div class="brand-name">
        <strong>Les Aliments Benito</strong>
        <span>Wholesale Meat Supplier</span>
      </div>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="/order" data-i18n="navOrder">Place your order</a>
      <button id="logoutButton" class="text-button" type="button" data-i18n="logoutButton">Logout</button>
      <button class="language-toggle" type="button" data-language-toggle>FR</button>
    </nav>
  </header>

  <main class="account-shell">
    <!-- Profile card -->
    <section class="profile-card">
      <div class="profile-card-header">
        <div>
          <p class="eyebrow" data-i18n="accountEyebrow" style="margin-bottom:4px">Customer account</p>
          <h2 id="profileName">—</h2>
        </div>
        <button class="btn-sm" id="editProfileBtn" type="button">Edit profile</button>
      </div>

      <div class="profile-fields" id="profileFields">
        <div class="profile-field">
          <span class="label">Company</span>
          <span class="value" id="profileCompany">—</span>
        </div>
        <div class="profile-field">
          <span class="label">Email</span>
          <span class="value" id="profileEmail">—</span>
        </div>
        <div class="profile-field">
          <span class="label">Phone</span>
          <span class="value" id="profilePhone">—</span>
        </div>
        <div class="profile-field">
          <span class="label">Delivery address</span>
          <span class="value" id="profileAddress">—</span>
        </div>
      </div>

      <!-- Edit form (hidden by default) -->
      <form class="profile-edit-form" id="profileEditForm" novalidate style="display:none">
        <div class="form-row">
          <label>
            Contact name
            <input id="editName" type="text" />
          </label>
          <label>
            Company
            <input id="editCompany" type="text" />
          </label>
        </div>
        <div class="form-row">
          <label>
            Phone
            <input id="editPhone" type="tel" />
          </label>
        </div>
        <label>
          Delivery address
          <textarea id="editAddress" rows="2"></textarea>
        </label>
        <div class="profile-edit-actions">
          <button class="btn-sm primary" type="submit">Save changes</button>
          <button class="btn-sm" type="button" id="cancelEditBtn">Cancel</button>
        </div>
        <p id="profileEditStatus" class="form-status"></p>
      </form>
    </section>

    <!-- Order history -->
    <div class="account-orders-header">
      <h2 data-i18n="accountTitle">My order history</h2>
      <a class="button primary" href="/order" style="font-size:14px;min-height:38px;padding:8px 16px" data-i18n="navOrder">Place your order</a>
    </div>

    <div id="accountOrdersList" class="orders-list"></div>
  </main>

  <script src="/js/app.js?v=20260520-2" defer></script>
</body>
</html>

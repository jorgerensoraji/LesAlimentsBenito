<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Place Your Order | Les Aliments Benito</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body data-page="order">
  <header class="site-header">
    <a class="brand" href="/">
      <img src="/image/beni.png" alt="Les Aliments Benito logo" />
      <div class="brand-name">
        <strong>Les Aliments Benito</strong>
        <span>Wholesale Meat Supplier</span>
      </div>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="/" data-i18n="navHome">Home</a>
      <a href="/account" style="display:none" data-auth="customer" data-i18n="navAccount">My account</a>
      <a href="/admin" style="display:none" data-auth="admin">Admin</a>
      <a href="/login" style="display:none" data-auth="guest" data-i18n="navLogin">Login</a>
      <button class="text-button" style="display:none" data-auth="auth" type="button" data-i18n="logoutButton">Logout</button>
      <button class="language-toggle" type="button" data-language-toggle>FR</button>
    </nav>
  </header>

  <main class="order-shell">
    <section class="order-heading">
      <p class="eyebrow" data-i18n="orderPageEyebrow">Order request</p>
      <h1 data-i18n="orderPageTitle">Place your order</h1>
      <p data-i18n="orderPageText">Choose products, quantities, units, and notes. Your request will be saved and sent to the Benito team.</p>
    </section>

    <section class="order-layout">
      <div class="catalog-panel">
        <div class="toolbar">
          <input id="productSearch" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="Search products" />
          <select id="categoryFilter" aria-label="Category filter">
            <option value="all" data-i18n="allCategories">All categories</option>
          </select>
        </div>
        <div id="productCatalog" class="catalog-grid"></div>
      </div>

      <aside class="order-panel">
        <h2 data-i18n="selectedTitle">Selected products</h2>
        <div id="selectedItems" class="selected-list"></div>

        <form id="orderForm" class="order-form" novalidate>
          <label>
            <span data-i18n="companyLabel">Company name</span>
            <input name="company" type="text" required />
          </label>
          <label>
            <span data-i18n="contactLabel">Contact name</span>
            <input name="contact" type="text" />
          </label>
          <label>
            <span data-i18n="emailLabel">Email</span>
            <input name="email" type="email" required />
          </label>
          <label>
            <span data-i18n="phoneLabel">Phone</span>
            <input name="phone" type="tel" />
          </label>
          <label>
            <span data-i18n="addressLabel">Delivery address</span>
            <textarea name="deliveryAddress" rows="3"></textarea>
          </label>
          <label>
            <span data-i18n="messageLabel">Additional message</span>
            <textarea name="message" rows="3"></textarea>
          </label>
          <button class="button primary full" type="submit" data-i18n="sendOrder">Send order</button>
          <p id="orderStatus" class="form-status" role="status"></p>
        </form>
      </aside>
    </section>
  </main>

  <script src="/js/app.js?v=20260520-2" defer></script>
</body>
</html>

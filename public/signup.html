<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Account | Les Aliments Benito</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body data-page="signup">
  <header class="site-header">
    <a class="brand" href="/">
      <img src="/image/beni.png" alt="Les Aliments Benito logo" />
      <div class="brand-name">
        <strong>Les Aliments Benito</strong>
        <span>Wholesale Meat Supplier</span>
      </div>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="/" data-i18n="navHome">Home</a>
      <a href="/login" data-i18n="navLogin">Login</a>
      <button class="language-toggle" type="button" data-language-toggle>FR</button>
    </nav>
  </header>

  <main class="auth-shell">
    <section class="auth-panel">
      <p class="eyebrow" data-i18n="signupEyebrow">Customer account</p>
      <h1 data-i18n="signupTitle">Create account</h1>
      <form id="signupForm" class="order-form">
        <label>
          <span data-i18n="companyLabel">Company name</span>
          <input name="company" type="text" required autocomplete="organization" />
        </label>
        <label>
          <span data-i18n="contactLabel">Contact name</span>
          <input name="contact" type="text" autocomplete="name" />
        </label>
        <label>
          <span data-i18n="emailLabel">Email</span>
          <input name="email" type="email" required autocomplete="email" />
        </label>
        <label>
          <span data-i18n="phoneLabel">Phone</span>
          <input name="phone" type="tel" autocomplete="tel" />
        </label>
        <label>
          <span data-i18n="addressLabel">Delivery address</span>
          <textarea name="deliveryAddress" rows="3" autocomplete="street-address"></textarea>
        </label>
        <label>
          <span data-i18n="passwordLabel">Password</span>
          <input name="password" type="password" required minlength="8" autocomplete="new-password" />
        </label>
        <button class="button primary full" type="submit" data-i18n="signupButton">Create account</button>
        <p id="signupStatus" class="form-status" role="status"></p>
      </form>
    </section>
  </main>

  <script src="/js/app.js?v=20260520-2" defer></script>
</body>
</html>
